services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    container_name: weather-clickhouse
    restart: no
    networks:
      - weather-net
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-weather}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-chadmin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-chadmin}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123" # HTTP interface
      - "9002:9000" # Native client
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
